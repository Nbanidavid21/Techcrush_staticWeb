name: Deploy to AWS

on:
  push:
    branches:
      - main

# Required for OIDC authentication to AWS
permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      # Opt-in to Node 24 early to clear the deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1  # Change to your bucket region

    - name: Deploy to S3
      run: |
        aws s3 sync . s3://techcrushs3bucket --delete --exclude ".git/" --exclude ".github/"
