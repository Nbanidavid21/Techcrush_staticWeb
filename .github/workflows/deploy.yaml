name: Deploy to AWS

on:
  push:
    branches:
      - main

# Required for OIDC authentication to AWS
permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      # Opt-in to Node 24 early to clear the deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Use OIDC (Recommended) or your updated Secret Keys
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Double-check this matches your resource region
          mask-aws-account-id: true

      - name: Deploy to Service
        run: |
          echo "Starting deployment..."
          # Add your specific deployment commands here (e.g., ecs, s3, or beanstalk)
          # Example for AWS CLI:
          # aws ecs update-service --cluster MyCluster --service MyService --force-new-deployment